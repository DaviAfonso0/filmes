<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo escuro cinematic -->
  <rect width="200" height="200" fill="#1a1a1a"/>
  
  <!-- Bobina de filme (círculos) -->
  <g id="bobina-esquerda">
    <circle cx="60" cy="100" r="35" fill="none" stroke="#d32f2f" stroke-width="8"/>
    <circle cx="60" cy="100" r="25" fill="none" stroke="#d32f2f" stroke-width="4"/>
    <circle cx="60" cy="100" r="8" fill="#d32f2f"/>
  </g>
  
  <!-- Filmes no meio -->
  <g id="filmes">
    <rect x="85" y="75" width="30" height="50" fill="none" stroke="#d32f2f" stroke-width="3" rx="2"/>
    <line x1="95" y1="75" x2="95" y2="125" stroke="#d32f2f" stroke-width="2"/>
    <line x1="105" y1="75" x2="105" y2="125" stroke="#d32f2f" stroke-width="2"/>
    <line x1="115" y1="75" x2="115" y2="125" stroke="#d32f2f" stroke-width="2"/>
  </g>
  
  <!-- Bobina direita -->
  <g id="bobina-direita">
    <circle cx="140" cy="100" r="35" fill="none" stroke="#d32f2f" stroke-width="8"/>
    <circle cx="140" cy="100" r="25" fill="none" stroke="#d32f2f" stroke-width="4"/>
    <circle cx="140" cy="100" r="8" fill="#d32f2f"/>
  </g>
  
  <!-- Estrela no topo (referência aos favoritos) -->
  <g id="estrela">
    <polygon points="100,30 106,48 125,48 110,60 116,78 100,66 84,78 90,60 75,48 94,48" fill="#d32f2f"/>
  </g>
</svg>